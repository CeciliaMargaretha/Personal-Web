<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cute Portfolio</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family: 'Poppins', sans-serif;
    background:#0B1F3A;
    color:white;
    overflow-x:hidden;
}

/* ================= NAVBAR ================= */
.navbar{
    backdrop-filter: blur(10px);
    background: rgba(11,31,58,0.6);
}
.navbar-brand{
    font-weight:700;
    color:#EC4899 !important;
    animation: glow 2s infinite alternate;
}
@keyframes glow{
    from{ text-shadow:0 0 5px #EC4899; }
    to{ text-shadow:0 0 20px #EC4899; }
}
.nav-link{
    color:white !important;
    position:relative;
}
.nav-link::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-5px;
    width:0%;
    height:3px;
    background:#EC4899;
    transition:0.4s;
    border-radius:10px;
}
.nav-link:hover::after{
    width:100%;
}

/* ================= HERO ================= */
#home{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    background:linear-gradient(135deg,#0B1F3A,#1E3A8A,#7C3AED,#EC4899);
    background-size:400% 400%;
    animation: gradientMove 8s ease infinite;
}
@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}
.btn-cute{
    background:#EC4899;
    border:none;
    border-radius:30px;
    padding:12px 30px;
    transition:0.3s;
}
.btn-cute:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px #EC4899;
}

/* ================= CUTE 3D ANIMALS ================= */
.animal{
    position:fixed;
    width:80px;
    transition:0.5s;
    cursor:pointer;
    filter: drop-shadow(0 0 10px #EC4899);
}
.animal:hover{
    transform:rotateY(180deg) scale(1.3);
}

/* ================= SLIDER ================= */
.carousel img{
    height:500px;
    object-fit:cover;
    border-radius:20px;
}

/* ================= SECTION ================= */
section{
    padding:100px 0;
}

/* ================= FOOTER ================= */
footer{
    background:rgba(0,0,0,0.5);
    padding:20px;
    text-align:center;
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container">
    <a class="navbar-brand" href="#">Cils 💖</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navmenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navmenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#home">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#slider">Gallery</a></li>
        <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- HERO -->
<section id="home">
  <div>
    <h1 class="display-4 fw-bold">Halo, Saya Cils 🐰</h1>
    <p class="lead">Web Developer | UI Designer | Creative Girl</p>
    <a href="#slider" class="btn btn-cute">Lihat Gallery</a>
  </div>
</section>

<!-- SLIDER -->
<section id="slider" class="container text-center">
<h2 class="mb-5">Gallery Saya ✨</h2>

<div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="https://picsum.photos/1200/600?1" class="d-block w-100">
    </div>
    <div class="carousel-item">
      <img src="https://picsum.photos/1200/600?2" class="d-block w-100">
    </div>
    <div class="carousel-item">
      <img src="https://picsum.photos/1200/600?3" class="d-block w-100">
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>
</div>
</section>

<!-- CONTACT -->
<section id="contact" class="container text-center">
<h2 class="mb-4">Contact Me 💌</h2>
<form class="mx-auto" style="max-width:500px;">
<input type="text" class="form-control mb-3" placeholder="Nama">
<input type="email" class="form-control mb-3" placeholder="Email">
<textarea class="form-control mb-3" rows="4" placeholder="Pesan"></textarea>
<button class="btn btn-cute w-100">Kirim</button>
</form>
</section>

<!-- CUTE FLOATING ANIMALS -->
<img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" class="animal" style="top:20%; left:5%;">
<img src="https://cdn-icons-png.flaticon.com/512/616/616430.png" class="animal" style="bottom:15%; right:8%;">
<img src="https://cdn-icons-png.flaticon.com/512/616/616554.png" class="animal" style="top:60%; left:10%;">

<footer>
© 2026 Cils. Made with 💖
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
